<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Film Tools</title>
<meta name="description" content="Film-style photo grading and reel creation tools.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --accent: #007AFF;
    --accent-dark: #0051D5;
    --accent-light: rgba(0, 122, 255, 0.12);
    --ink: #1C1C1E;
    --ink2: #3A3A3C;
    --muted: #8E8E93;
    --muted2: #AEAEB2;
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --border: rgba(60, 60, 67, 0.12);
    --radius-lg: 20px;
    --radius-md: 12px;
    --shadow-card: 0 2px 16px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, 'Inter', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #E8F0F4;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: clip;
    position: relative;
  }
  .page-backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-color: #E8F0F4;
    background-image:
      linear-gradient(
        180deg,
        rgba(248, 250, 252, 0.42) 0%,
        rgba(236, 244, 248, 0.28) 42%,
        rgba(232, 240, 244, 0.48) 100%
      ),
      url('assets/film-tools-beach-backdrop.jpg');
    background-position: left 58%;
    background-size: cover;
    background-repeat: no-repeat;
  }
  .page-backdrop::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 85% 50% at 50% 12%, rgba(255,255,255,0.35), transparent 68%),
      linear-gradient(90deg, rgba(255,255,255,0.08), transparent 22%, transparent 78%, rgba(255,255,255,0.1));
  }
  header {
    background: rgba(8,8,14,0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 10px 16px;
    padding-top: calc(10px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(0, 122, 255, 0.35);
  }
  .brand-title {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  main {
    position: relative;
    z-index: 1;
    max-width: 360px;
    margin: 0 auto;
    padding: 16px 16px calc(80px + env(safe-area-inset-bottom));
  }
  .hero-text {
    font-size: 13px;
    color: var(--ink2);
    line-height: 1.45;
    margin-bottom: 12px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.65);
  }
  .card {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 8px;
    box-shadow: 0 4px 16px rgba(28, 48, 64, 0.07), 0 1px 0 rgba(255,255,255,0.9) inset;
    text-decoration: none;
    display: block;
    color: inherit;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover {
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 8px 20px rgba(28, 48, 64, 0.1), 0 1px 0 rgba(255,255,255,0.95) inset;
  }
  .card:active { transform: scale(0.99); }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    min-height: 22px;
  }
  @media (max-width: 720px) {
    .page-backdrop {
      background-image:
        linear-gradient(
          180deg,
          rgba(248, 250, 252, 0.14) 0%,
          rgba(236, 244, 248, 0.06) 40%,
          rgba(232, 240, 244, 0.16) 100%
        ),
        url('assets/film-tools-beach-backdrop.jpg');
      background-position: left bottom;
      background-size: cover;
    }
    .page-backdrop::after {
      background:
        radial-gradient(ellipse 90% 36% at 50% 6%, rgba(255,255,255,0.14), transparent 72%);
    }
    .card {
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-bottom: 8px;
    }
    .hero-text {
      color: var(--ink);
      text-shadow: 0 1px 2px rgba(255,255,255,0.85);
    }
    main {
      max-width: 320px;
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>
  <div class="page-backdrop" aria-hidden="true"></div>
  <header>
    <div class="header-inner">
      <div class="brand-mark">フ</div>
      <div class="brand-title">Film Tools</div>
    </div>
  </header>
  <main>
    <p class="hero-text">Film-style grading and reel tools.</p>
    <a class="card" href="film-reel-studio.html">
      <div class="card-title">Film Reel Studio</div>
      <div class="card-desc">Photos, recipes, focal points, animated reels.</div>
      <div class="tag">Open →</div>
    </a>
    <a class="card" href="film-recipe-studio.html">
      <div class="card-title">Film Recipe Studio</div>
      <div class="card-desc">Grade stills or export a reel.</div>
      <div class="tag">Open →</div>
    </a>
    <a class="card" href="film-strip-studio.html">
      <div class="card-title">Film Strip Studio</div>
      <div class="card-desc">Looping multi-photo strip with 35mm edges.</div>
      <div class="tag">Open →</div>
    </a>
  </main>
</body>
</html>
